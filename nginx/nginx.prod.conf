# nginx/nginx.prod.conf — produzione senza SSL (OPZIONE A)

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  upstream backend {
    server backend:8000;
  }

  upstream frontend {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    # Aumenta il limite per upload file (allegati spese, documenti progetto)
    client_max_body_size 50M;

    # API → backend FastAPI
    location /api/ {
      proxy_pass         http://backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 120s;  # export asincrono può richiedere tempo
    }

    # Tutto il resto → frontend React
    location / {
      proxy_pass       http://frontend;
      proxy_set_header Host $host;
    }
  }
}
