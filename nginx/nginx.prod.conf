# nginx/nginx.prod.conf — produzione senza SSL

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  upstream backend {
    server backend:8000;
  }

  upstream frontend {
    server frontend:80;
  }

  upstream missioni {
    server missioni:8001;
  }

  # ── Gestionale (porta 80) ──────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # API FastAPI
    location /api/ {
      proxy_pass         http://backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 120s;
    }

    # React SPA
    location / {
      proxy_pass       http://frontend;
      proxy_set_header Host $host;
    }
  }

  # ── Missioni-app (porta 8001) ──────────────────────────────────────────────
  server {
    listen 8001;
    server_name _;

    client_max_body_size 50M;

    # File statici Django (serviti direttamente da nginx — più veloce)
    location /static/ {
      alias /app/staticfiles/;
      expires 30d;
      add_header Cache-Control "public, no-transform";
    }

    # Media (PDF, firme, allegati)
    location /media/ {
      alias /app/media/;
    }

    # Tutto il resto → Django via gunicorn
    location / {
      proxy_pass         http://missioni;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }
  }
}
