server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # index.html: sempre rivalidato, altrimenti il browser non vede i nuovi
  # riferimenti ai bundle dopo un deploy (serve hard refresh)
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # asset con hash nel nome (Vite): cache permanente, cambiano nome se cambiano contenuto
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
