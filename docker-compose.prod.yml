# docker-compose.prod.yml — produzione (server on-premise)
#
# PRIMA DI USARE:
#   1. Copia .env.prod.example → .env.prod e compila tutte le variabili
#   2. Avvio: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-480}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SYNC_API_KEY: ${SYNC_API_KEY}
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      # SSL (decommentare quando si aggiunge il dominio + Certbot):
      # - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # SSL (decommentare):
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

  backup:
    image: postgres:16
    restart: always
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
    volumes:
      - backup_data:/backups
      - ./scripts/backup.sh:/backup.sh:ro
      - ./scripts/run-backup-loop.sh:/run-backup-loop.sh:ro
    entrypoint: ["sh", "/run-backup-loop.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
  backup_data:
