# docker-compose.yml — sviluppo locale (Mac e Windows)
# Avvio: docker compose up -d

services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gestionale_ricerca
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d gestionale_ricerca"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/gestionale_ricerca
      JWT_SECRET: dev-secret-change-in-prod
      JWT_EXPIRE_MINUTES: 480
      UPLOAD_DIR: /app/uploads
      ALLOWED_ORIGINS: http://localhost:5173
      SYNC_API_KEY: gestionale-missioni-sync-key-dev
      MISSIONI_URL: http://missioni:8001
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  missioni:
    build: /Users/pino/missioni-app
    ports:
      - "8001:8001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: missioni
      DB_USER: dev
      DB_PASSWORD: dev
      SITE_URL: http://localhost:8001
      DEBUG: "true"
      GESTIONALE_URL: http://backend:8000
      GESTIONALE_SYNC_KEY: gestionale-missioni-sync-key-dev
      GESTIONALE_FRONTEND_URL: http://localhost:5173
      GESTIONALE_DB_NAME: gestionale_ricerca
    volumes:
      - /Users/pino/missioni-app:/app
      - /Users/pino/missioni-app/media:/app/media
      - missioni_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:latest
    ports:
      - "5051:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
  missioni_static:
